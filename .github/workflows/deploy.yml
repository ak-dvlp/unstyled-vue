name: Deploy VitePress site to Pages

on:
  # push:
  # branches: [main]
  workflow_dispatch:

# Устанавливает разрешения для GITHUB_TOKEN, разрешающие развертывание на страницах GitHub
permissions:
  contents: read
  pages: write
  id-token: write

# Позволяет только одно одновременное развертывание
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Не требуется, но рекомендуется для последних обновленных временных меток

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn # Автоматическое кэширование модулей Yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build with VitePress
        run: yarn docs:build # Запуск сборки документации

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # Указывает на скомпилированные статические ресурсы
          overwrite: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
